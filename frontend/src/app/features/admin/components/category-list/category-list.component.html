<div class="min-h-screen bg-[#F8FAFC]">
  <!-- Global Administrative Header: Command Hub -->
  <header class="bg-white border-b border-neutral-200/50 sticky top-0 z-[100] backdrop-blur-xl bg-white/80">
    <div
      class="max-w-[1500px] mx-auto py-8 px-6 md:px-10 flex flex-col md:flex-row md:items-center md:justify-between gap-6">
      <div class="space-y-1 animate-fadeIn">
        <div class="flex items-center gap-3 mb-2">
          <div class="w-10 h-1 grad-indigo rounded-full"></div>
          <span class="caption text-primary-600 font-black tracking-[0.3em]">ZenFit Taxonomy Core</span>
        </div>
        <h1 class="text-4xl font-black text-neutral-900 tracking-tighter leading-none">Category Taxonomy</h1>
        <p class="text-neutral-400 font-medium text-sm md:text-base max-w-xl">
          Architectural organization of fitness disciplines. Defining the structural boundaries of the ZenFit ecosystem.
        </p>
      </div>

      <div class="flex items-center gap-3">
        <button type="button" (click)="createCategory()"
          class="btn btn-primary btn-sm gap-2 rounded-2xl shadow-lg shadow-primary-500/30 font-black uppercase tracking-widest text-[10px]">
          <i class="fas fa-plus"></i>
          Create Category
        </button>
      </div>
    </div>
  </header>

  <main class="container-custom py-10 animate-slideInUp">
    <div class="space-y-8">
      <div class="flex items-center gap-4">
        <div class="w-2 h-8 grad-indigo rounded-full"></div>
        <h2 class="text-sm font-black text-neutral-900 uppercase tracking-[0.2em]">Transaction Ledger</h2>
      </div>

      <app-table [title]="'Category Management'" [subtitle]="'Manage categories and subcategories'"
        [entityName]="'Category'" [columns]="categoryColumns" [data]="categories" [actions]="categoryActions"
        (actionClicked)="onCategoryAction($event)" [currentPage]="page" [pageSize]="pageSize"
        [totalItems]="totalCategories" (pageChanged)="onPageChanged($event)" (searchChanged)="onSearchChanged($event)"
        (sortChanged)="onSortChanged($event)"></app-table>
    </div>
  </main>
</div>

<style>
  .grad-indigo {
    background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
  }
</style>
