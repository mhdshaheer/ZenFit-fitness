<div class="min-h-screen bg-[#F8FAFC]">
  <!-- Global Administrative Header: Command Hub -->
  <header class="bg-white border-b border-neutral-200/50 sticky top-0 z-[100] backdrop-blur-xl bg-white/80">
    <div class="max-w-[1500px] mx-auto py-8 px-6 md:px-10">
      <div class="space-y-1 animate-fadeIn">
        <div class="flex items-center gap-3 mb-2">
          <div class="w-10 h-1 grad-indigo rounded-full"></div>
          <span class="caption text-primary-600 font-black tracking-[0.3em]">ZenFit User Oracle</span>
        </div>
        <h1 class="text-4xl font-black text-neutral-900 tracking-tighter leading-none">Security & Access</h1>
        <p class="text-neutral-400 font-medium text-sm md:text-base max-w-xl">
          Direct management of system cohorts and permission artifacts. Controlling global access signals across the
          platform.
        </p>
      </div>
    </div>
  </header>

  <main class="max-w-[1500px] mx-auto px-6 md:px-10 py-10 animate-slideInUp">
    <!-- User Ledger Container -->
    <div class="space-y-8">
      <div class="flex items-center gap-4">
        <div class="w-2 h-8 grad-indigo rounded-full"></div>
        <h2 class="text-sm font-black text-neutral-900 uppercase tracking-[0.2em]">Transaction Ledger</h2>
      </div>

      <app-table [title]="'User Management'" [subtitle]="'Manage system users and their permissions'"
        [entityName]="'User'" [columns]="userColumns" [data]="(users$ | async) || []" [actions]="userActions"
        (actionClicked)="onUserAction($event)" [currentPage]="page" [pageSize]="pageSize" [totalItems]="totalUsers"
        (pageChanged)="onPageChanged($event)" (searchChanged)="onSearchChanged($event)"
        (sortChanged)="onSortChanged($event)"></app-table>
    </div>
  </main>
</div>

<style>
  .grad-indigo {
    background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
  }
</style>
