<div class="flex flex-col min-h-screen bg-neutral-50">
  <app-header [logoText]="'Zenfit'" [userProfile]="currentUser" [navigationItems]="navItems"
    [userMenuItems]="userMenuItems" [searchPlaceholder]="'Search exercises, workouts, nutrition...'"
    [showDateBanner]="true" (searchChange)="handleSearchChange($event)" (searchSubmit)="handleSearchSubmit($event)"
    (userMenuClick)="handleUserMenuClick($event)" (logout)="handleLogout()"
    (mobileMenuToggle)="handleMobileMenuToggle($event)"></app-header>

  <main class="flex-grow pt-[132px]">
    <router-outlet></router-outlet>
  </main>

  <app-footer></app-footer>
</div>
