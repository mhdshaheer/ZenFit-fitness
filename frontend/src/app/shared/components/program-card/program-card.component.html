<!-- Modern Program Card Component -->
<div class="card card-hover card-interactive group h-full flex flex-col overflow-hidden">
  <!-- Image Section -->
  <div class="relative h-44 overflow-hidden">
    <img [src]="program.image ? program.image : defaultImage" [alt]="program.title"
      class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />

    <!-- Gradient Overlay -->
    <div class="absolute inset-0 bg-gradient-to-t from-neutral-900/60 via-transparent to-transparent"></div>

    <!-- Top Badges -->
    <div class="absolute inset-x-0 top-0 px-4 pt-4 flex items-start justify-between gap-2">
      <!-- Difficulty Badge -->
      <span [class]="'badge !py-0.5 !px-2 !text-[9px] ' + getDifficultyColor(program.difficultyLevel)">
        {{ program.difficultyLevel }}
      </span>

      <!-- Approval Status Badge -->
      <span class="badge !py-0.5 !px-2 !text-[9px]" [ngClass]="getApprovalBadge(program.approvalStatus)">
        {{ (program.approvalStatus || 'Pending') | titlecase }}
      </span>
    </div>

    <!-- Category Badge (Bottom Left) -->
    <div class="absolute bottom-4 left-4">
      <span [class]="'badge !py-0.5 !px-2 !text-[9px] ' + getCategoryColor(program.category)">
        {{ categoryDisplay }}
      </span>
    </div>
  </div>

  <!-- Content Section -->
  <div class="flex-1 flex flex-col p-5 space-y-3.5">
    <!-- Title & Description -->
    <div class="flex-1 space-y-2">
      <h3
        class="text-sm font-black text-neutral-900 line-clamp-2 group-hover:text-primary-700 transition-colors leading-tight">
        {{ program.title }}
      </h3>
      <p class="body-small text-neutral-600 line-clamp-2 leading-relaxed">
        {{ program.description }}
      </p>
    </div>

    <!-- Meta Information -->
    <div class="grid grid-cols-2 gap-3 pt-3.5 border-t border-neutral-100">
      <!-- Duration -->
      <div class="flex items-center gap-2.5">
        <div
          class="w-8 h-8 rounded-lg bg-primary-50 flex items-center justify-center group-hover:bg-primary-600 group-hover:text-white transition-all duration-300">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </div>
        <div>
          <p class="text-[7px] font-black text-neutral-400 uppercase tracking-widest leading-none mb-1">Duration</p>
          <p class="text-[11px] font-black text-neutral-900">{{ program.duration }}</p>
        </div>
      </div>

      <!-- Price -->
      <div class="flex items-center gap-2.5">
        <div
          class="w-8 h-8 rounded-lg bg-secondary-50 flex items-center justify-center group-hover:bg-secondary-600 group-hover:text-white transition-all duration-300">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </div>
        <div>
          <p class="text-[7px] font-black text-neutral-400 uppercase tracking-widest leading-none mb-1">Price</p>
          <p class="text-[11px] font-black gradient-text">₹{{ program.price }}</p>
        </div>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="flex gap-2.5 pt-1.5">
      <!-- View Details Button -->
      <button (click)="onViewProgram(program.id!)"
        class="flex-1 btn btn-primary btn-sm !py-2 !rounded-lg !text-[9px] group/btn">
        <span>{{ button1Labal }}</span>
      </button>

      <!-- Secondary Action Button -->
      <button (click)="onViewProgramSlot(program.id!)"
        class="flex-1 btn btn-outline btn-sm !py-2 !rounded-lg !text-[9px]" [ngClass]="btn2Class">
        <span>{{ button2Labal }}</span>
      </button>
    </div>
  </div>

  <!-- Hover Effect Overlay -->
  <div
    class="absolute inset-0 border-2 border-primary-400 rounded-2xl opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
  </div>
</div>
