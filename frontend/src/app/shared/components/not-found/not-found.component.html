<div class="min-h-screen bg-neutral-950 flex items-center justify-center p-6 relative overflow-hidden">
  <!-- Dynamic Ambient Glows -->
  <div class="absolute top-1/4 -left-20 w-96 h-96 bg-primary-600/10 rounded-full blur-[120px] animate-float"></div>
  <div class="absolute bottom-1/4 -right-20 w-96 h-96 bg-secondary-400/10 rounded-full blur-[120px] animate-float"
    style="animation-delay: -1.5s;"></div>

  <div class="max-w-2xl w-full relative z-10 text-center space-y-12">
    <!-- 404 Visual Artifact -->
    <div class="relative inline-block animate-slideInUp">
      <div class="absolute inset-0 bg-primary-600/20 blur-3xl rounded-full scale-150 opacity-50"></div>
      <h1
        class="text-[12rem] md:text-[18rem] font-black leading-none tracking-tighter text-transparent bg-clip-text bg-gradient-to-b from-white via-neutral-400 to-neutral-800 opacity-20 select-none">
        404
      </h1>
      <div class="absolute inset-0 flex items-center justify-center">
        <div class="space-y-2">
          <span class="caption text-primary-400 tracking-[0.5em] block animate-pulse">Lost in Orbit</span>
          <h2 class="text-4xl md:text-5xl font-black text-white uppercase tracking-tighter">Artifact Missing</h2>
        </div>
      </div>
    </div>

    <!-- Contextual Explanation -->
    <div class="space-y-6 max-w-lg mx-auto animate-slideInUp" style="animation-delay: 200ms;">
      <p class="text-neutral-400 font-medium text-lg leading-relaxed">
        The resource you are attempting to synchronize with has been moved or purged from the central ledger.
      </p>

      <!-- Action Matrix -->
      <div class="flex flex-col sm:flex-row gap-4 justify-center pt-8">
        <button (click)="goHome()" class="btn btn-primary !px-10 !py-4 shadow-2xl shadow-primary-500/20 group">
          <span class="font-black uppercase tracking-widest text-xs">Return to Nexus</span>
          <svg class="w-4 h-4 ml-2 transition-transform group-hover:-translate-x-1 rotate-180" fill="none"
            stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3" />
          </svg>
        </button>

        <button (click)="goBack()"
          class="btn btn-secondary !bg-white/10 !backdrop-blur-xl border-white/10 !text-white hover:!bg-white/20 transition-all !px-10 !py-4 group">
          <span class="font-black uppercase tracking-widest text-xs">Previous Node</span>
          <svg class="w-4 h-4 ml-2 opacity-50 transition-opacity group-hover:opacity-100" fill="none"
            stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Decorative Status Line -->
    <div class="pt-20 opacity-20">
      <div class="flex items-center justify-center gap-4">
        <div class="h-px w-12 bg-gradient-to-r from-transparent to-white"></div>
        <span class="text-[9px] font-black uppercase tracking-[0.4em] text-white">System Status: Operative</span>
        <div class="h-px w-12 bg-gradient-to-l from-transparent to-white"></div>
      </div>
    </div>
  </div>
</div>
