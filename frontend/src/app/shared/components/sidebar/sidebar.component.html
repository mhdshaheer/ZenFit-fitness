@if (isLargeScreen ? !isDesktopOpen : !isMobileOpen) {
<button
  class="fixed top-4 left-4 z-[100] flex items-center justify-center w-12 h-12 gradient-primary rounded-xl shadow-lg hover:shadow-xl hover:scale-110 active:scale-95 transition-all duration-200 cursor-pointer pointer-events-auto"
  (click)="isLargeScreen ? toggleDesktop() : toggleMobile(); $event.stopPropagation()" aria-label="Open menu">
  <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16M4 18h16"></path>
  </svg>
</button>
}

<!-- Mobile Overlay -->
@if (!isLargeScreen && isMobileOpen) {
<div class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[80] pointer-events-auto cursor-pointer"
  (click)="toggleMobile()"></div>
}

<!-- Sidebar Container -->
<aside
  class="h-full z-[90] transition-all duration-300 ease-in-out overflow-hidden bg-white border-r border-neutral-200 pointer-events-auto"
  [class.fixed]="!isLargeScreen" [class.inset-y-0]="!isLargeScreen" [class.left-0]="!isLargeScreen"
  [class.translate-x-0]="isLargeScreen ? isDesktopOpen : isMobileOpen"
  [class.-translate-x-full]="isLargeScreen ? !isDesktopOpen : !isMobileOpen" [class.relative]="isLargeScreen"
  [class.w-60]="isLargeScreen ? isDesktopOpen : true" [class.w-56]="!isLargeScreen"
  [class.w-0]="isLargeScreen && !isDesktopOpen" [class.opacity-0]="isLargeScreen && !isDesktopOpen">

  <div class="flex flex-col h-full bg-white border-r border-neutral-200 shadow-2xl overflow-hidden">
    <!-- Header -->
    <div class="relative flex items-center justify-between p-5 border-b border-neutral-100 bg-white">
      <!-- Brand Logo/Icon -->
      <div class="flex items-center space-x-2.5">
        <div class="w-9 h-9 gradient-primary rounded-xl flex items-center justify-center shadow-lg">
          <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 2L2 7v10c0 5.55 3.84 9.74 9 11 5.16-1.26 9-5.45 9-11V7l-10-5z" />
          </svg>
        </div>
        <div>
          <h1 class="text-lg font-black text-neutral-900 tracking-tight">{{ appName }}</h1>
          <p class="text-[9px] text-primary-600 font-black uppercase tracking-[0.2em]">Management</p>
        </div>
      </div>

      <!-- Toggle/Close Button -->
      <button
        class="p-1.5 rounded-xl hover:bg-neutral-100 transition-all text-neutral-400 hover:text-primary-600 cursor-pointer"
        (click)="isLargeScreen ? toggleDesktop() : toggleMobile()">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
            [attr.d]="isLargeScreen ? 'M11 19l-7-7 7-7m8 14l-7-7 7-7' : 'M6 18L18 6M6 6l12 12'"></path>
        </svg>
      </button>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 p-3 space-y-1 overflow-y-auto custom-scrollbar">
      @for (item of menuItems; track item.label) {
      <a [routerLink]="item.route" routerLinkActive="bg-primary-600 text-white shadow-xl shadow-primary-500/20"
        class="group flex items-center space-x-3 py-2.5 px-3.5 rounded-xl text-neutral-500 hover:text-primary-700 hover:bg-primary-50 transition-all duration-300 relative overflow-hidden"
        (click)="onMenuItemClick(item)">
        <div class="relative z-10 w-5 flex justify-center">
          <i [class]="item.icon" class="text-base transition-transform group-hover:scale-110"></i>
        </div>
        <span class="relative z-10 text-[11px] font-bold tracking-wide uppercase">{{ item.label }}</span>

        <!-- Active Indicator Dot -->
        <div
          class="absolute right-4 w-1.5 h-1.5 bg-white rounded-full opacity-0 group-[.router-link-active]:opacity-100 shadow-sm transition-opacity">
        </div>
      </a>
      } @empty {
      <div class="p-6 text-center bg-neutral-50 rounded-2xl border-2 border-dashed border-neutral-100">
        <p class="text-[10px] font-bold text-neutral-400 uppercase tracking-widest leading-loose">No Access Points
          Available
        </p>
      </div>
      }
    </nav>

    <!-- Footer -->
    <div class="p-3 border-t border-neutral-100 bg-neutral-50/50">
      <div class="flex items-center justify-between p-2.5 rounded-2xl bg-white border border-neutral-200 shadow-sm">
        <!-- User Info -->
        <div class="flex items-center space-x-2.5 flex-1 min-w-0">
          <div class="relative">
            <div class="w-9 h-9 gradient-primary rounded-xl flex items-center justify-center shadow-md">
              <i class="fas fa-user-shield text-xs text-white"></i>
            </div>
            <div
              class="absolute -bottom-0.5 -right-0.5 w-3 h-3 bg-success-500 border-2 border-white rounded-full shadow-sm animate-pulse">
            </div>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-xs font-black text-neutral-900 truncate tracking-tight">{{ userName }}</p>
            <p class="text-[9px] text-neutral-400 font-bold uppercase tracking-widest">{{ userRole }} Access</p>
          </div>
        </div>

        <!-- Logout -->
        <button
          class="w-8 h-8 flex items-center justify-center bg-error-50 text-error-600 rounded-xl hover:bg-error-600 hover:text-white transition-all shadow-sm"
          title="Secure Logout" (click)="onLogout()">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
        </button>
      </div>
    </div>
  </div>
</aside>
