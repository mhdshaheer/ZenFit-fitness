<!-- Mobile Toggle Button -->
@if(!isMobileOpen){
<button
  class="fixed top-4 left-4 z-0 flex items-center justify-center w-11 h-11 gradient-primary rounded-xl shadow-lg hover:shadow-xl hover:scale-105 active:scale-95 transition-all duration-200"
  (click)="toggleMobile()" aria-label="Open menu">
  <svg class="w-6 h-6 text-white transition-transform duration-200" fill="none" stroke="currentColor"
    viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16M4 18h16"></path>
  </svg>
</button>
}

<!-- Sidebar -->
<aside
  class="fixed top-0 left-0 z-40 h-full w-72 transform transition-all duration-300 ease-in-out lg:w-80 lg:static lg:inset-0"
  [class.translate-x-0]="isMobileOpen" [class.-translate-x-full]="!isMobileOpen">

  <div class="flex flex-col h-full bg-white border-r border-neutral-200 shadow-2xl overflow-hidden">
    <!-- Header -->
    <div class="relative flex items-center justify-between p-6 border-b border-neutral-100 bg-white">
      <!-- Brand Logo/Icon -->
      <div class="flex items-center space-x-3">
        <div class="w-10 h-10 gradient-primary rounded-xl flex items-center justify-center shadow-lg">
          <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 2L2 7v10c0 5.55 3.84 9.74 9 11 5.16-1.26 9-5.45 9-11V7l-10-5z" />
          </svg>
        </div>
        <div>
          <h1 class="text-xl font-black text-neutral-900 tracking-tight">{{ appName }}</h1>
          <p class="text-[10px] text-primary-600 font-black uppercase tracking-[0.2em]">Management</p>
        </div>
      </div>

      <!-- Close Button (Mobile) -->
      <button class="lg:hidden p-2 rounded-xl hover:bg-neutral-100 transition-all" (click)="toggleMobile()">
        <svg class="w-5 h-5 text-neutral-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 p-4 space-y-2 overflow-y-auto custom-scrollbar">
      @for (item of menuItems; track item.label) {
      <a [routerLink]="item.route" routerLinkActive="bg-primary-600 text-white shadow-xl shadow-primary-500/20"
        class="group flex items-center space-x-3 py-3.5 px-4 rounded-xl text-neutral-500 hover:text-primary-700 hover:bg-primary-50 transition-all duration-300 relative overflow-hidden"
        (click)="onMenuItemClick(item)">
        <div class="relative z-10 w-6 flex justify-center">
          <i [class]="item.icon" class="text-lg transition-transform group-hover:scale-110"></i>
        </div>
        <span class="relative z-10 text-sm font-bold tracking-wide uppercase">{{ item.label }}</span>

        <!-- Active Indicator Dot -->
        <div
          class="absolute right-4 w-1.5 h-1.5 bg-white rounded-full opacity-0 group-[.router-link-active]:opacity-100 shadow-sm transition-opacity">
        </div>
      </a>
      } @empty {
      <div class="p-8 text-center bg-neutral-50 rounded-2xl border-2 border-dashed border-neutral-100">
        <p class="text-xs font-bold text-neutral-400 uppercase tracking-widest leading-loose">No Access Points Available
        </p>
      </div>
      }
    </nav>

    <!-- Footer -->
    <div class="p-4 border-t border-neutral-100 bg-neutral-50/50">
      <div class="flex items-center justify-between p-3 rounded-2xl bg-white border border-neutral-200 shadow-sm">
        <!-- User Info -->
        <div class="flex items-center space-x-3 flex-1 min-w-0">
          <div class="relative">
            <div class="w-10 h-10 gradient-primary rounded-xl flex items-center justify-center shadow-md">
              <i class="fas fa-user-shield text-sm text-white"></i>
            </div>
            <div
              class="absolute -bottom-0.5 -right-0.5 w-3.5 h-3.5 bg-success-500 border-2 border-white rounded-full shadow-sm animate-pulse">
            </div>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-black text-neutral-900 truncate tracking-tight">{{ userName }}</p>
            <p class="text-[10px] text-neutral-400 font-bold uppercase tracking-widest">{{ userRole }} Access</p>
          </div>
        </div>

        <!-- Logout -->
        <button
          class="w-9 h-9 flex items-center justify-center bg-error-50 text-error-600 rounded-xl hover:bg-error-600 hover:text-white transition-all shadow-sm"
          title="Secure Logout" (click)="onLogout()">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
        </button>
      </div>
    </div>
  </div>
</aside>
